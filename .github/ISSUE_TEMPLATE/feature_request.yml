name: Feature Request
description: Suggest a new collection, overlay, or config improvement
labels: [enhancement]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New collection
        - New overlay
        - Collection modification
        - New poster
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What would you like?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Why is this needed?
    validations:
      required: true
